<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodMart | Onlayn Do'kon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .navbar { background-color: #2c3e50 !important; }
        .navbar-brand { font-weight: bold; color: #fff !important; }
        .nav-link { color: #ecf0f1 !important; }
        footer { background: #2c3e50; color: #fff; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'index' %}">FOODMART</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'index' %}">Bosh sahifa</a></li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'cart' %}">
                            Savat 
                            <span class="badge bg-danger rounded-pill">{% if cart_count %}{{ cart_count }}{% else %}0{% endif %}</span>
                        </a>
                    </li>
                    {% if user.is_authenticated %}
                        <li class="nav-item"><a class="nav-link" href="{% url 'profile' %}">Profil</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Chiqish</a></li>
                    {% else %}
                        <li class="nav-item"><a class="nav-link" href="#">Kirish</a></li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="text-center py-4 mt-5">
        <p>&copy; 2026 FoodMart - Barcha huquqlar himoyalangan.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
