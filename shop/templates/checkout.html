{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-7">
            <div class="card p-4 shadow-sm border-0 mb-4">
                <h2 class="mb-4">📦 Buyurtmani rasmiylashtirish</h2>
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">To'liq ism-sharifingiz</label>
                        <input type="text" name="full_name" class="form-control" placeholder="Ism Familiya" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Telefon raqamingiz</label>
                        <input type="text" name="phone" class="form-control" placeholder="+998 90 123 45 67" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Yetkazib berish manzili</label>
                        <textarea name="address" class="form-control" rows="3" placeholder="To'liq manzilni kiriting..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-success btn-lg w-100 mt-3">Buyurtmani tasdiqlash</button>
                </form>
            </div>
        </div>

        <div class="col-md-5">
            <div class="card p-4 shadow-sm border-0 bg-light">
                <h4 class="mb-3">Xarid xulosasi</h4>
                <hr>
                <div class="d-flex justify-content-between mb-2">
                    <span>Mahsulotlar soni:</span>
                    <strong>{{ cart_items.count }} ta</strong>
                </div>
                <div class="d-flex justify-content-between mb-2">
                    <span>Yetkazib berish:</span>
                    <span class="text-muted">Bepul</span>
                </div>
                <hr>
                <div class="d-flex justify-content-between align-items-center">
                    <span class="fs-5">Jami to'lov:</span>
                    <h3 class="text-success m-0">{{ total_price }} so'm</h3>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
